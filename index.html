<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#B8336A" />
  <title>Workshop Método Lash Mastery™</title>
  <meta name="description" content="Descubre cómo mujeres latinas están transformando una habilidad premium en una fuente de ingresos en Estados Unidos." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Decorative background blobs -->
  <div class="bg-decoration" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <!-- App root -->
  <main id="app" class="app">
    <!-- Progress bar -->
    <div class="progress-container" id="progressContainer">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-meta">
        <span class="progress-percent" id="progressPercent">0%</span>
        <span class="progress-step" id="progressStep">0 / 11</span>
      </div>
    </div>

    <!-- Screen container -->
    <div class="screen-viewport">
      <div class="screen" id="screen"></div>
    </div>

    <!-- Footer brand -->
    <footer class="brand-footer">
      <span>© Método Lash Mastery™</span>
    </footer>
  </main>

  <!-- Toast / notifications -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="script.js"></script>
</body>
</html>
